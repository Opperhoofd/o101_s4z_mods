<!DOCTYPE html>
<html tabindex="0" data-settings-key="fan-viewer-settings-v3">
    <head>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
        <meta name="apple-mobile-web-app-capable" content="yes"/>
        <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';"/>

        <title>O101: Fan Viewer</title>

        <script type="module">
            import {main} from './src/fan-viewer.mjs';
            import {watch, changeCamera} from './src/fan-viewer.mjs';
            
            main();
            window.watch = watch;
            window.changeCamera = changeCamera;
        </script>

        <link id="favicon" rel="shortcut icon" href="../../../../images/favicon.png"/>
        <link rel="stylesheet" href="/pages/css/common.css"/>
        <link rel="stylesheet" href="./css/ui.css"/>
        <link rel="stylesheet" href="./css/nearby-race-v2.css"/>
        <link rel="stylesheet" href="./css/fan-viewer.css"/>
    </head>
    <body>
        <div id="titlebar">
            <header>
                <div class="logo"><img src="/pages/images/icon128.png"/></div>
                <div class="title">O101: Fan Viewer</div>
                <div class="filler"></div>
                <div class="buttons">
                    <a class="button" onClick="window.location.reload()" title="Reload">&#x21bb;</a>
                    <a class="button open-settings" href="./settings/fan-viewer.html?width=375&height=350&child-window"
                       title="Open settings window" target="fan-viewer-settings"><ms>settings</ms></a>
                    <div title="Minimize" class="button minimize electron-only"><ms>minimize</ms></div>
                    <div title="Close this window" class="button close electron-only"><ms>close</ms></div>
                </div>
            </header>
        </div>
        <div id="content">
            <div id="controls">
                <div class="header"><span>Fan viewer</span></div>
                <div id="me"></div>
                <div>
                    <div class="info-item header"><span>Group options</span></div>
                    <div onClick="watch('watchFirstOfGroup')">&#x23EA; First of group</div>
                    <div onClick="watch('watchCenterOfGroup')">&#x1F7E1; Center of group</div>
                    <div onClick="watch('watchLastOfGroup')">&#x23E9; Last of group</div>
                </div>
                <div class="info-item header"><span>Miscellaneous</span></div>
                <div>
                    <div onClick="watch('watchFirstOfRace')">&#x23EA; First of race</div>
                    <div onClick="watch('watchLastOfRace')">&#x23E9; Last of race</div>
                    <div onClick="changeCamera()">&nbsp;&#x21bb;&nbsp; Change camera</div>
                </div>
                <div class="info-item header"><span>Marked athletes</span></div>
                <div id="markedRiders"></div>
                <div class="info-item header"><span>Robo pacers</span></div>
                <div id="roboPacers"></div>
            </div>
        </div>
        <div id="hintbar">
            <div class="hint"></div>
        </div>
    </body>
</html>
