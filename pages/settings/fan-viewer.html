<!DOCTYPE html>
<html class="settings-page" tabindex="0" data-settings-key="fan-viewer-settings-v3">
    <head>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
        <meta name="apple-mobile-web-app-capable" content="yes"/>
        <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';"/>
        
        <link id="favicon" rel="shortcut icon" href="../../../../images/favicon.png"/>
        <link rel="stylesheet" href="/pages/css/common.css"/>
        <link rel="stylesheet" href="../css/settings.css"/>

        <title>O101: Fan Viewer - Settings</title>

        <script type="module">
            import {main,getWatchingId} from '../src/o101/settings.mjs';
            main('fan-viewer-fields-v2');
            document.querySelector('#myZwiftId').setAttribute('wid', await getWatchingId());
        </script>
        <script>
            function setCurrentId() {
                const input = document.querySelector('#myZwiftId');
                input.value = input.getAttribute('wid');
                input.dispatchEvent(new Event("input", { bubbles: true }));
            }
        </script>
    </head>
    <body>
        <div id="titlebar">
            <header>
                <div class="logo"><img src="/pages/images/icon128.png"/></div>
                <div class="title">O101: Fan Viewer - Settings</div>
                <div class="filler"></div>
                <div class="buttons">
                    <div title="Close this window" class="button close electron-only" onclick="window.close()"><ms>close</ms></div>
                </div>
            </header>
        </div>
        <div id="settings">
            <form id="options" class="section">
                <div class="title">Window Settings</div>
                <label>
                    <key>Theme override:</key>
                    <select is="sauce-theme" override></select>
                </label>
                <hr/>
                    <a href="https://github.com/Opperhoofd/o101_s4z_mods?tab=readme-ov-file#O101-racing-MODS" target="_help">&#128161; show help &#128161;</a>
                <hr/>
                <label>
                    <key>My Zwift ID:</key>
                    <input id="myZwiftId" type="text" name="myZwiftId" size="12"/><input type="button" value="Set current" onclick="setCurrentId()"/>
                </label>
                <label>
                    <key>Show marked riders:</key>
                    <input type="checkbox" name="showMarkedRiders"/>
                </label>
                <label>
                    <key>Show robo pacers:</key>
                    <input type="checkbox" name="showRoboPacers"/>
                </label>
                <hr/>
                <a href="https://www.buymeacoffee.com/oaphinan" target="_blank"><img src="https://cdn.buymeacoffee.com/buttons/v2/default-yellow.png" alt="Buy Me A Coffee" style="height: 30px !important;width: 108px !important;" ></a>
            </form>
            <form id="fields" class="section">
            </form>
        </div>
    </body>
</html>
